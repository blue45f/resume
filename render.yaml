# [DEPRECATED] Render Blueprint
# 운영은 GCP Cloud Run으로 이전됨. (`pnpm deploy:gcp` 또는
# `gcloud run deploy resume-api --source . --project resume-platform-prod --region asia-northeast3`)
# 이 파일은 Render 회귀가 필요할 때를 위한 참고용으로 남아 있을 뿐이며,
# 운영 도메인·환경변수는 Cloud Run 콘솔이 정답입니다.
services:
  - type: web
    name: resume-api
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev --include=dev && npx prisma generate && npx nest build --builder swc
    startCommand: npx prisma db push --skip-generate && node dist-server/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Neon PostgreSQL URL
      - key: PORT
        value: "3001"
      - key: API_URL
        value: https://resume-api-464016453534.asia-northeast3.run.app
      - key: FRONTEND_URL
        value: https://resume-gongbang.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://resume-gongbang.vercel.app
      - key: JWT_SECRET
        sync: false  # 안전한 랜덤 문자열 (32자 이상)
      # OAuth - GitHub
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      # OAuth - Google
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # OAuth - Kakao
      - key: KAKAO_CLIENT_ID
        sync: false
      # LLM
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: resume-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
