# Render Blueprint - 백엔드 API 서버
services:
  - type: web
    name: resume-api
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev --include=dev && npx prisma generate && npx nest build --builder swc
    startCommand: npx prisma db push --skip-generate && node dist-server/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Neon PostgreSQL URL
      - key: PORT
        value: "3001"
      - key: API_URL
        value: https://resume-api-mm0o.onrender.com
      - key: FRONTEND_URL
        value: https://resume-silk-three.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://resume-silk-three.vercel.app
      - key: JWT_SECRET
        sync: false  # 안전한 랜덤 문자열 (32자 이상)
      # OAuth - GitHub
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      # OAuth - Google
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # OAuth - Kakao
      - key: KAKAO_CLIENT_ID
        sync: false
      # LLM
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: resume-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
