# Run with SONAR_HOST_URL and SONAR_TOKEN supplied by your shell or CI secrets.
sonar.projectKey=resume-platform
sonar.projectName=resume-platform
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/.vercel/**,**/.turbo/**,**/.cache/**,**/storybook-static/**,**/pnpm-lock.yaml,**/package-lock.json,**/yarn.lock,**/bun.lockb,**/*.min.js,**/*.generated.*,**/generated/**,**/public/**/*.png,**/public/**/*.jpg,**/public/**/*.jpeg,**/public/**/*.webp,**/public/**/*.avif,**/public/**/*.ico,**/public/**/*.svg
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/test/**,**/tests/**,**/*.config.*,**/scripts/**,**/docs/**,**/public/**,**/deploy/**,**/infra/**,**/prisma/**
sonar.cpd.exclusions=**/*.test.*,**/*.spec.*,**/seed*.ts,**/seed*.js,**/seed*.mjs
sonar.typescript.tsconfigPaths=tsconfig.json,packages/server/tsconfig.json,packages/shared/tsconfig.json,packages/client/tsconfig.json

sonar.javascript.node.maxspace=4096
