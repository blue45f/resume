packages:
  - '.'
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  argon2: true
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
  '@firebase/util': false
onlyBuiltDependencies:
  - argon2
  - '@nestjs/core'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@swc/core'
  - esbuild
  - msw
  - prisma
  - protobufjs
  - unrs-resolver

overrides:
  brace-expansion: '^5.0.5'
  # @apps-in-toss/web-framework 가 jest@29 트리(jest-mock@29.7.0)를 끌어와 jest@30 서버 테스트의
  # moduleMocker.clearMocksOnScope 호출이 깨짐 → jest-mock 을 30 으로 정렬(테스트 전용, 런타임 무관).
  jest-mock: 30.4.1

  # minimatch@10 이 vendored brace-expansion@1 잘못 깔려서 expand named export 못 찾음 (concat-map 누락).
  # packageExtensions 로 minimatch 의 brace-expansion 의존성을 ^5 로 명시 → vendored v1 차단.
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'
packageExtensions:
  minimatch:
    dependencies:
      brace-expansion: '^5.0.5'

minimumReleaseAgeExclude:
  - react-hook-form
  - '@heejun/eslint-config@5.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp
