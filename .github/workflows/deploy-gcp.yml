name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'prisma.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: resume-platform-prod

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy resume-api \
            --source . \
            --project resume-platform-prod \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe resume-api --region asia-northeast3 --format='value(status.url)')
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: $URL"
              exit 0
            fi
            echo "Attempt $i/10: status=$STATUS, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
