name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'packages/shared/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'prisma.config.ts'
      - '.github/workflows/deploy-gcp.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - uses: actions/checkout@v7

      - name: Skip deployment when GCP credentials are not configured
        if: env.GCP_SA_KEY == ''
        run: echo "GCP_SA_KEY is not configured; skipping Cloud Run deployment."

      - name: Google Auth
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3
        if: env.GCP_SA_KEY != ''
        with:
          project_id: resume-platform-prod

      - name: Deploy to Cloud Run
        if: env.GCP_SA_KEY != ''
        run: |
          gcloud run deploy resume-api \
            --source . \
            --project resume-platform-prod \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --clear-base-image \
            --quiet

      - name: Health check
        if: env.GCP_SA_KEY != ''
        run: |
          URL=$(gcloud run services describe resume-api --region asia-northeast3 --format='value(status.url)')
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: $URL"
              exit 0
            fi
            echo "Attempt $i/10: status=$STATUS, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
